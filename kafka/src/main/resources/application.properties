spring.application.name=kafka
spring.config.import=optional:file:./.env[.properties],optional:file:./kafka/.env[.properties]

# server port
server.port=${SERVER_PORT:8080}

# db properties
spring.datasource.url=${APP_DB_URL:jdbc:mysql://localhost:3306/kafka}
spring.datasource.driver-class-name=${APP_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${APP_DB_USERNAME:musta}
spring.datasource.password=${APP_DB_PASSWORD:D0cker57}
spring.datasource.hikari.pool-name=${APP_DB_POOL_NAME:kafka-hikari-pool}
spring.datasource.hikari.minimum-idle=${APP_DB_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${APP_DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.connection-timeout=${APP_DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${APP_DB_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${APP_DB_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.auto-commit=${APP_DB_AUTO_COMMIT:true}
spring.datasource.hikari.transaction-isolation=${APP_DB_TRANSACTION_ISOLATION:TRANSACTION_REPEATABLE_READ}

# jpa
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_catalog=${APP_DB_NAME:kafka}

# flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# actuator / prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.prometheus.metrics.export.enabled=true

# kafka
spring.kafka.bootstrap-servers=${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
app.kafka.admin.bootstrap-servers=${APP_KAFKA_ADMIN_BOOTSTRAP_SERVERS:${spring.kafka.bootstrap-servers}}
app.kafka.admin.bootstrap-controllers=${APP_KAFKA_ADMIN_BOOTSTRAP_CONTROLLERS:}
app.kafka.admin.client-id=${APP_KAFKA_ADMIN_CLIENT_ID:topic-admin}
app.kafka.admin.default-api-timeout-ms=${APP_KAFKA_ADMIN_DEFAULT_API_TIMEOUT_MS:60000}
app.kafka.admin.request-timeout-ms=${APP_KAFKA_ADMIN_REQUEST_TIMEOUT_MS:30000}
app.kafka.admin.connections-max-idle-ms=${APP_KAFKA_ADMIN_CONNECTIONS_MAX_IDLE_MS:300000}
app.kafka.admin.client-dns-lookup=${APP_KAFKA_ADMIN_CLIENT_DNS_LOOKUP:use_all_dns_ips}
app.kafka.admin.receive-buffer-bytes=${APP_KAFKA_ADMIN_RECEIVE_BUFFER_BYTES:65536}
app.kafka.consumer-group-id=${APP_KAFKA_CONSUMER_GROUP_ID:kafka-demo-group}
app.kafka.consumer.auto-offset-reset=${APP_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
app.kafka.consumer.enable-auto-commit=${APP_KAFKA_CONSUMER_ENABLE_AUTO_COMMIT:true}
app.kafka.consumer.auto-commit-interval-ms=${APP_KAFKA_CONSUMER_AUTO_COMMIT_INTERVAL_MS:5000}
app.kafka.consumer.max-poll-records=${APP_KAFKA_CONSUMER_MAX_POLL_RECORDS:100}
app.kafka.consumer.max-poll-interval-ms=${APP_KAFKA_CONSUMER_MAX_POLL_INTERVAL_MS:300000}
app.kafka.consumer.fetch-min-bytes=${APP_KAFKA_CONSUMER_FETCH_MIN_BYTES:1}
app.kafka.consumer.fetch-max-bytes=${APP_KAFKA_CONSUMER_FETCH_MAX_BYTES:52428800}
app.kafka.consumer.max-partition-fetch-bytes=${APP_KAFKA_CONSUMER_MAX_PARTITION_FETCH_BYTES:1048576}
app.kafka.consumer.heartbeat-interval-ms=${APP_KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS:3000}
app.kafka.consumer.session-timeout-ms=${APP_KAFKA_CONSUMER_SESSION_TIMEOUT_MS:45000}
app.kafka.consumer.isolation-level=${APP_KAFKA_CONSUMER_ISOLATION_LEVEL:read_uncommitted}
app.kafka.consumer.group-protocol=${APP_KAFKA_CONSUMER_GROUP_PROTOCOL:classic}
app.kafka.consumer.partition-assignment-strategy=${APP_KAFKA_CONSUMER_PARTITION_ASSIGNMENT_STRATEGY:org.apache.kafka.clients.consumer.RangeAssignor,org.apache.kafka.clients.consumer.CooperativeStickyAssignor}
app.kafka.consumer.client-dns-lookup=${APP_KAFKA_CONSUMER_CLIENT_DNS_LOOKUP:use_all_dns_ips}
app.kafka.consumer.group-instance-id=${APP_KAFKA_CONSUMER_GROUP_INSTANCE_ID:}

app.kafka.consumers.activity.group-id=${APP_KAFKA_ACTIVITY_GROUP_ID:activity-group}
app.kafka.consumers.activity.client-id=${APP_KAFKA_ACTIVITY_CLIENT_ID:activity-consumer}
app.kafka.consumers.activity.concurrency=${APP_KAFKA_ACTIVITY_CONCURRENCY:1}
app.kafka.consumers.order.group-id=${APP_KAFKA_ORDER_GROUP_ID:order-group}
app.kafka.consumers.order.client-id=${APP_KAFKA_ORDER_CLIENT_ID:order-consumer}
app.kafka.consumers.order.concurrency=${APP_KAFKA_ORDER_CONCURRENCY:1}
app.kafka.consumers.mail-request.group-id=${APP_KAFKA_MAIL_REQUEST_GROUP_ID:mail-request-group}
app.kafka.consumers.mail-request.client-id=${APP_KAFKA_MAIL_REQUEST_CLIENT_ID:mail-request-consumer}
app.kafka.consumers.mail-request.concurrency=${APP_KAFKA_MAIL_REQUEST_CONCURRENCY:1}
app.kafka.consumers.audit.group-id=${APP_KAFKA_AUDIT_GROUP_ID:audit-group}
app.kafka.consumers.audit.client-id=${APP_KAFKA_AUDIT_CLIENT_ID:audit-consumer}
app.kafka.consumers.audit.concurrency=${APP_KAFKA_AUDIT_CONCURRENCY:1}

app.kafka.topics.user-login.name=${APP_KAFKA_TOPIC_USER_LOGIN:user.login}
app.kafka.topics.user-login.partitions=${APP_KAFKA_TOPIC_USER_LOGIN_PARTITIONS:1}
app.kafka.topics.user-login.replicas=${APP_KAFKA_TOPIC_USER_LOGIN_REPLICAS:1}
app.kafka.topics.user-login.cleanup-policy=${APP_KAFKA_TOPIC_USER_LOGIN_CLEANUP_POLICY:delete}
app.kafka.topics.user-login.retention-ms=${APP_KAFKA_TOPIC_USER_LOGIN_RETENTION_MS:2592000000}
app.kafka.topics.user-login.segment-bytes=${APP_KAFKA_TOPIC_USER_LOGIN_SEGMENT_BYTES:268435456}

app.kafka.topics.user-click.name=${APP_KAFKA_TOPIC_USER_CLICK:user.click}
app.kafka.topics.user-click.partitions=${APP_KAFKA_TOPIC_USER_CLICK_PARTITIONS:1}
app.kafka.topics.user-click.replicas=${APP_KAFKA_TOPIC_USER_CLICK_REPLICAS:1}
app.kafka.topics.user-click.cleanup-policy=${APP_KAFKA_TOPIC_USER_CLICK_CLEANUP_POLICY:delete}
app.kafka.topics.user-click.retention-ms=${APP_KAFKA_TOPIC_USER_CLICK_RETENTION_MS:604800000}
app.kafka.topics.user-click.segment-bytes=${APP_KAFKA_TOPIC_USER_CLICK_SEGMENT_BYTES:134217728}
app.kafka.topics.user-click.compression-type=${APP_KAFKA_TOPIC_USER_CLICK_COMPRESSION_TYPE:producer}

app.kafka.topics.order-created.name=${APP_KAFKA_TOPIC_ORDER_CREATED:order.created}
app.kafka.topics.order-created.partitions=${APP_KAFKA_TOPIC_ORDER_CREATED_PARTITIONS:1}
app.kafka.topics.order-created.replicas=${APP_KAFKA_TOPIC_ORDER_CREATED_REPLICAS:1}
app.kafka.topics.order-created.cleanup-policy=${APP_KAFKA_TOPIC_ORDER_CREATED_CLEANUP_POLICY:delete}
app.kafka.topics.order-created.retention-ms=${APP_KAFKA_TOPIC_ORDER_CREATED_RETENTION_MS:7776000000}
app.kafka.topics.order-created.segment-bytes=${APP_KAFKA_TOPIC_ORDER_CREATED_SEGMENT_BYTES:268435456}
app.kafka.topics.order-created.min-insync-replicas=${APP_KAFKA_TOPIC_ORDER_CREATED_MIN_INSYNC_REPLICAS:1}

app.kafka.topics.order-cancelled.name=${APP_KAFKA_TOPIC_ORDER_CANCELLED:order.cancelled}
app.kafka.topics.order-cancelled.partitions=${APP_KAFKA_TOPIC_ORDER_CANCELLED_PARTITIONS:1}
app.kafka.topics.order-cancelled.replicas=${APP_KAFKA_TOPIC_ORDER_CANCELLED_REPLICAS:1}
app.kafka.topics.order-cancelled.cleanup-policy=${APP_KAFKA_TOPIC_ORDER_CANCELLED_CLEANUP_POLICY:delete}
app.kafka.topics.order-cancelled.retention-ms=${APP_KAFKA_TOPIC_ORDER_CANCELLED_RETENTION_MS:7776000000}
app.kafka.topics.order-cancelled.segment-bytes=${APP_KAFKA_TOPIC_ORDER_CANCELLED_SEGMENT_BYTES:268435456}
app.kafka.topics.order-cancelled.min-insync-replicas=${APP_KAFKA_TOPIC_ORDER_CANCELLED_MIN_INSYNC_REPLICAS:1}

app.kafka.topics.mail-requested.name=${APP_KAFKA_TOPIC_MAIL_REQUESTED:mail.requested}
app.kafka.topics.mail-requested.partitions=${APP_KAFKA_TOPIC_MAIL_REQUESTED_PARTITIONS:1}
app.kafka.topics.mail-requested.replicas=${APP_KAFKA_TOPIC_MAIL_REQUESTED_REPLICAS:1}
app.kafka.topics.mail-requested.cleanup-policy=${APP_KAFKA_TOPIC_MAIL_REQUESTED_CLEANUP_POLICY:delete}
app.kafka.topics.mail-requested.retention-ms=${APP_KAFKA_TOPIC_MAIL_REQUESTED_RETENTION_MS:1209600000}
app.kafka.topics.mail-requested.segment-bytes=${APP_KAFKA_TOPIC_MAIL_REQUESTED_SEGMENT_BYTES:134217728}
app.kafka.topics.mail-requested.max-message-bytes=${APP_KAFKA_TOPIC_MAIL_REQUESTED_MAX_MESSAGE_BYTES:1048588}

app.kafka.topics.audit-event.name=${APP_KAFKA_TOPIC_AUDIT_EVENT:audit.event}
app.kafka.topics.audit-event.partitions=${APP_KAFKA_TOPIC_AUDIT_EVENT_PARTITIONS:1}
app.kafka.topics.audit-event.replicas=${APP_KAFKA_TOPIC_AUDIT_EVENT_REPLICAS:1}
app.kafka.topics.audit-event.cleanup-policy=${APP_KAFKA_TOPIC_AUDIT_EVENT_CLEANUP_POLICY:delete}
app.kafka.topics.audit-event.retention-ms=${APP_KAFKA_TOPIC_AUDIT_EVENT_RETENTION_MS:15552000000}
app.kafka.topics.audit-event.segment-bytes=${APP_KAFKA_TOPIC_AUDIT_EVENT_SEGMENT_BYTES:268435456}
app.kafka.topics.audit-event.message-timestamp-type=${APP_KAFKA_TOPIC_AUDIT_EVENT_MESSAGE_TIMESTAMP_TYPE:CreateTime}

# rabbitmq
spring.rabbitmq.host=${APP_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${APP_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${APP_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${APP_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

app.rabbitmq.mail.exchange=mail.exchange
app.rabbitmq.mail.routing-key=mail.send
app.rabbitmq.mail.queue=mail.send.queue
app.rabbitmq.mail.retry-routing-key=mail.retry
app.rabbitmq.mail.retry-queue=mail.retry.queue
app.rabbitmq.mail.retry-delay-ms=5000
app.rabbitmq.mail.max-attempts=3
app.rabbitmq.mail.dlx=mail.dlx
app.rabbitmq.mail.dlq=mail.dlq
app.rabbitmq.mail.dlq-routing-key=mail.send.dlq
app.rabbitmq.mail.retry-batch-size=50
app.rabbitmq.management.base-url=${APP_RABBITMQ_MANAGEMENT_BASE_URL:http://localhost:15672/api}
app.rabbitmq.management.username=${APP_RABBITMQ_MANAGEMENT_USERNAME:${APP_RABBITMQ_USERNAME:guest}}
app.rabbitmq.management.password=${APP_RABBITMQ_MANAGEMENT_PASSWORD:${APP_RABBITMQ_PASSWORD:guest}}

# docker compose
spring.docker.compose.file=compose.yaml
spring.docker.compose.lifecycle-management=start-only

# mailhog
spring.mail.host=${APP_MAIL_HOST:localhost}
spring.mail.port=${APP_MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# hikari debug
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
