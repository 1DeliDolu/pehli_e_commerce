<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' - Kafka App'">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-body-tertiary d-flex flex-column min-vh-100">

<nav th:replace="~{_fragments/navbar :: navbar}"></nav>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center g-4">
            <div class="col-12 col-xl-10">
                <section class="card border-0 shadow-sm app-page-header">
                    <div class="card-body p-4 p-lg-5 d-flex flex-column justify-content-center">
                        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
                            <div>
                                <h1 class="h2 fw-bold mb-2" th:text="${pageTitle}">Item Form</h1>
                                <p class="text-secondary mb-0">Manage product and category information.</p>
                            </div>
                            <a href="/admin/products" class="btn btn-outline-dark">Back to List</a>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col-12 col-lg-8 col-xl-7">
                <div class="card border-0 shadow-sm app-section-card">
                    <div class="card-body p-4 p-md-5">
                        <div class="alert alert-danger shadow-sm border-0" th:if="${formErrorMessage}" th:text="${formErrorMessage}">
                            Operation failed.
                        </div>

                        <form th:action="${formAction}" th:object="${productForm}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <div class="mb-3">
                                <label for="name" class="form-label">Product Name</label>
                                <input id="name" type="text" class="form-control" th:field="*{name}" required>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="price" class="form-label">Price</label>
                                    <input id="price" type="number" step="0.01" min="0.01" class="form-control" th:field="*{price}" required>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="categoryId" class="form-label">Category</label>
                                    <select id="categoryId" class="form-select" th:field="*{categoryId}" required>
                                        <option value="">Select a category</option>
                                        <option th:each="category : ${categories}"
                                                th:value="${category.id}"
                                                th:text="${category.name}">Category</option>
                                    </select>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                                </div>
                            </div>

                            <div class="mt-3 mb-4">
                                <label for="description" class="form-label">Description</label>
                                <textarea id="description" class="form-control" rows="6" th:field="*{description}"></textarea>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                            </div>

                            <button type="submit" class="btn btn-dark w-100" th:text="${submitLabel}">Save</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
