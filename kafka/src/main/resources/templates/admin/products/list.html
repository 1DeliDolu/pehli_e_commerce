<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Products - Kafka App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-body-tertiary d-flex flex-column min-vh-100">

<nav th:replace="~{_fragments/navbar :: navbar}"></nav>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center g-4">
            <div class="col-12 col-xl-10">
                <section class="card border-0 shadow-sm app-page-header">
                    <div class="card-body p-4 p-lg-5 d-flex flex-column justify-content-center">
                        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
                            <div>
                                <h1 class="h2 fw-bold mb-2">Admin Products</h1>
                                <p class="text-secondary mb-0">Urun CRUD ekrani.</p>
                            </div>
                            <div class="d-flex flex-column flex-sm-row gap-2">
                                <a href="/admin/orders" class="btn btn-outline-dark">Orders</a>
                                <a href="/admin/categories" class="btn btn-outline-dark">Categories</a>
                                <a href="/admin/mail-queue" class="btn btn-outline-dark">Mail Queue</a>
                                <a href="/admin/topics" class="btn btn-outline-dark">Topics</a>
                                <a href="/admin/products/new" class="btn btn-dark">Yeni Urun</a>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col-12 col-xl-10">
                <div class="alert alert-success shadow-sm border-0" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="alert alert-danger shadow-sm border-0" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <div class="card border-0 shadow-sm">
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Description</th>
                                <th class="text-end">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="product : ${products}">
                                <td th:text="${product.id}">1</td>
                                <td class="fw-semibold" th:text="${product.name}">Name</td>
                                <td th:text="${product.category.name}">Category</td>
                                <td th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')} + ' EUR'">0.00 EUR</td>
                                <td th:text="${product.description ?: '-'}">Description</td>
                                <td class="text-end">
                                    <div class="d-inline-flex gap-2">
                                        <a th:href="@{/admin/products/{id}/edit(id=${product.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                                        <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post" class="m-0">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(products)}">
                                <td colspan="6" class="text-center py-4 text-secondary">Henuz urun yok.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="toast-container position-fixed top-0 end-0 p-3" th:if="${successMessage != null or errorMessage != null}">
    <div class="toast align-items-center border-0 shadow"
         th:classappend="${errorMessage != null} ? ' text-bg-danger' : ' text-bg-success'"
         id="adminFlashToast"
         role="alert"
         aria-live="assertive"
         aria-atomic="true"
         data-bs-delay="3500">
        <div class="d-flex">
            <div class="toast-body" th:text="${errorMessage ?: successMessage}">Islem tamamlandi.</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:if="${successMessage != null or errorMessage != null}">
    const adminFlashToastElement = document.getElementById('adminFlashToast');
    if (adminFlashToastElement) {
        bootstrap.Toast.getOrCreateInstance(adminFlashToastElement).show();
    }
</script>
</body>
</html>
