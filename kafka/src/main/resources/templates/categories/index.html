<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categories - Kafka App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-body-tertiary d-flex flex-column min-vh-100">

<nav th:replace="~{_fragments/navbar :: navbar}"></nav>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center g-4">
            <div class="col-12 col-xl-10">
                <section class="card border-0 shadow-sm app-page-header">
                    <div class="card-body p-4 p-lg-5 d-flex flex-column justify-content-center">
                        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
                            <div>
                                <h1 class="h2 fw-bold mb-2">Categories</h1>
                                <p class="text-secondary mb-0">Her kategorideki urun adetleriyle liste.</p>
                            </div>
                            <a th:if="${isAdmin}" href="/admin/categories" class="btn btn-dark">Admin CRUD</a>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col-12 col-xl-10">
                <div class="row g-4" th:if="${!#lists.isEmpty(categories)}">
                    <div class="col-12 col-md-6 col-xl-4" th:each="category : ${categories}">
                        <div class="card h-100 border-0 shadow-sm position-relative app-section-card">
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <h2 class="h5 fw-bold mb-0" th:text="${category.name}">Category Name</h2>
                                    <span class="badge text-bg-primary" th:text="${#lists.size(category.products)} + ' urun'">0 urun</span>
                                </div>
                                <p class="text-secondary mb-3" th:text="${category.description ?: 'Aciklama eklenmemis.'}">Description</p>
                                <a class="stretched-link text-decoration-none fw-semibold"
                                   th:href="@{/products(categoryId=${category.id})}">
                                    Ilgili urunleri gor
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="alert alert-info shadow-sm border-0" th:if="${#lists.isEmpty(categories)}">
                    Henuz kategori yok. Admin ekranindan yeni kategori ekleyebilirsiniz.
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
