<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kafka App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-body-tertiary d-flex flex-column min-vh-100">

<nav th:replace="~{_fragments/navbar :: navbar}"></nav>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                <section class="card border-0 shadow-sm mb-4 app-page-header">
                    <div class="card-body p-4 p-lg-5 d-flex flex-column justify-content-center">
                        <h1 class="display-6 fw-bold mb-3">Kafka App</h1>
                        <p class="lead text-secondary mb-3">
                            Kafka destekli Spring Boot uygulamasının ana sayfası.
                        </p>
                        <p class="text-secondary mb-0" th:if="${loggedIn}">
                            Oturum acik kullanici: <strong th:text="${username}">username</strong>
                        </p>
                    </div>
                </section>

                <section class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-lg-5">
                        <div class="row g-3">
                            <div class="col-12 col-md-6 col-lg-4">
                                <a href="/products" class="btn btn-primary w-100 py-3">Products</a>
                            </div>
                            <div class="col-12 col-md-6 col-lg-4">
                                <a href="/categories" class="btn btn-outline-primary w-100 py-3">Categories</a>
                            </div>
                            <div class="col-12 col-md-6 col-lg-4" th:if="${!loggedIn}">
                                <a href="/login" class="btn btn-outline-secondary w-100 py-3">Login</a>
                            </div>
                            <div class="col-12 col-md-6 col-lg-4" th:if="${isAdmin}">
                                <a href="/admin/products" class="btn btn-dark w-100 py-3">Admin Products</a>
                            </div>
                            <div class="col-12 col-md-6 col-lg-4" th:if="${isAdmin}">
                                <a href="/admin/orders" class="btn btn-outline-dark w-100 py-3">Admin Orders</a>
                            </div>
                            <div class="col-12 col-md-6 col-lg-4" th:if="${isAdmin}">
                                <a href="/admin/categories" class="btn btn-outline-dark w-100 py-3">Admin Categories</a>
                            </div>
                            <div class="col-12 col-md-6 col-lg-4" th:if="${isAdmin}">
                                <a href="/admin/mail-queue" class="btn btn-outline-warning w-100 py-3">Admin Mail Queue</a>
                            </div>
                            <div class="col-12 col-md-6 col-lg-4" th:if="${loggedIn}">
                                <a href="/orders" class="btn btn-outline-primary w-100 py-3">My Orders</a>
                            </div>
                            <div class="col-12 col-md-6 col-lg-4" th:if="${loggedIn}">
                                <form th:action="@{/logout}" method="post" class="m-0">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-outline-danger w-100 py-3">Logout</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
