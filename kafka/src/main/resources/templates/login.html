<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Kafka App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body class="bg-body-tertiary d-flex flex-column min-vh-100">
    <nav th:replace="~{_fragments/navbar :: navbar}"></nav>

    <main class="flex-grow-1 py-5">
      <div class="container">
        <div class="row justify-content-center g-4">
          <div class="col-12 col-xl-10">
            <section class="card border-0 shadow-sm app-page-header">
              <div class="card-body p-4 p-lg-5 d-flex flex-column justify-content-center">
                <h1 class="h2 fw-bold mb-2">Login</h1>
                <p class="text-secondary mb-0">Hesabina giris yap ve uygulamaya ayni sayfa iskeletiyle devam et.</p>
              </div>
            </section>
          </div>

          <div class="col-12 col-md-8 col-lg-6 col-xl-5">
            <div class="card border-0 shadow-sm app-section-card">
              <div class="card-body p-4 p-md-5">
                <h2 class="h4 fw-bold mb-4 text-center">Account Login</h2>

                <form method="post" th:action="@{/login}">
                  <input
                    type="hidden"
                    th:name="${_csrf.parameterName}"
                    th:value="${_csrf.token}" />

                  <div th:if="${param.error}" class="alert alert-danger">
                    Kullanici adi veya sifre hatali.
                  </div>

                  <div th:if="${param.logout}" class="alert alert-success">
                    Cikis yapildi.
                  </div>

                  <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input
                      id="username"
                      name="username"
                      type="text"
                      class="form-control"
                      placeholder="Enter username"
                      required />
                  </div>

                  <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input
                      id="password"
                      name="password"
                      type="password"
                      class="form-control"
                      placeholder="Enter password"
                      required />
                  </div>

                  <button type="submit" class="btn btn-primary w-100">
                    Login
                  </button>
                </form>

                <div class="text-center mt-3">
                  <a href="/register" class="text-decoration-none"
                    >Don't have an account? Register</a
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
