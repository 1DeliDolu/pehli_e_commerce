<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${product.name} + ' - Kafka App'">Product Details - Kafka App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-body-tertiary d-flex flex-column min-vh-100">

<nav th:replace="~{_fragments/navbar :: navbar}"></nav>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center g-4">
            <div class="col-12 col-xl-10">
                <div class="alert alert-success shadow-sm border-0" th:if="${successMessage}" th:text="${successMessage}"></div>
                <nav aria-label="breadcrumb" class="mb-3">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="/">Home</a></li>
                        <li class="breadcrumb-item"><a href="/products">Products</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/products(categoryId=${product.category.id})}" th:text="${product.category.name}">Category</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="${product.name}">Product</li>
                    </ol>
                </nav>
            </div>

            <div class="col-12 col-xl-10">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-lg-5">
                        <div class="row g-5 align-items-start">
                            <div class="col-12 col-lg-7">
                                <div class="mb-3">
                                    <img id="productMainImage"
                                         class="img-fluid rounded-4 shadow-sm w-100 app-product-main-image"
                                         th:src="${productImages[0]}"
                                         th:alt="${product.name}">
                                </div>

                                <div class="row row-cols-4 g-3">
                                    <div class="col" th:each="image, stat : ${productImages}">
                                        <button type="button"
                                                class="btn p-0 w-100 rounded-4 overflow-hidden app-product-thumb"
                                                th:classappend="${stat.index == 0} ? ' active' : ''"
                                                th:data-full-src="${image}"
                                                th:data-alt="${product.name + ' image ' + (stat.index + 1)}">
                                            <img class="img-fluid w-100 app-product-thumb-image"
                                                 th:src="${image}"
                                                 th:alt="${product.name + ' thumbnail ' + (stat.index + 1)}">
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 col-lg-5">
                                <span class="badge text-bg-dark mb-3" th:text="${product.category.name}">Category</span>
                                <h1 class="display-6 fw-bold mb-3" th:text="${product.name}">Product Name</h1>
                                <div class="fs-2 fw-bold text-primary mb-4"
                                     th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')} + ' EUR'">
                                    99.90 EUR
                                </div>

                                <p class="text-secondary mb-4"
                                   th:text="${product.description ?: 'Bu urun icin aciklama eklenmemis.'}">
                                    Description
                                </p>

                                <div class="card bg-body-tertiary border-0 mb-4">
                                    <div class="card-body">
                                        <h2 class="h5 fw-bold mb-3">Product Details</h2>
                                        <ul class="list-group list-group-flush">
                                            <li class="list-group-item bg-transparent px-0 d-flex justify-content-between">
                                                <span>Product ID</span>
                                                <strong th:text="${product.id}">1</strong>
                                            </li>
                                            <li class="list-group-item bg-transparent px-0 d-flex justify-content-between">
                                                <span>Category</span>
                                                <strong th:text="${product.category.name}">Category</strong>
                                            </li>
                                            <li class="list-group-item bg-transparent px-0 d-flex justify-content-between">
                                                <span>Image Count</span>
                                                <strong>4</strong>
                                            </li>
                                        </ul>
                                    </div>
                                </div>

                                <div class="d-flex flex-column flex-sm-row gap-2">
                                    <form th:action="@{/cart/add}" method="post" th:attr="data-cart-endpoint=@{/api/cart/add}" data-cart-add-form>
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <input type="hidden" name="productId" th:value="${product.id}">
                                        <input type="hidden" name="redirectTo" th:value="'/products/' + ${product.id}">
                                        <button type="submit" class="btn btn-dark">Add to Cart</button>
                                    </form>
                                    <a href="/products" class="btn btn-outline-secondary">Back to Products</a>
                                    <a th:href="@{/products(categoryId=${product.category.id})}" class="btn btn-primary">More in Category</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/cart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const mainImage = document.getElementById('productMainImage');
        const thumbs = document.querySelectorAll('.app-product-thumb');

        thumbs.forEach(function (thumb) {
            thumb.addEventListener('click', function () {
                mainImage.src = thumb.dataset.fullSrc;
                mainImage.alt = thumb.dataset.alt;

                thumbs.forEach(function (item) {
                    item.classList.remove('active');
                });
                thumb.classList.add('active');
            });
        });
    });
</script>
</body>
</html>
