<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products - Kafka App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-body-tertiary d-flex flex-column min-vh-100">

<nav th:replace="~{_fragments/navbar :: navbar}"></nav>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center g-4">
            <div class="col-12 col-xl-10">
                <section class="card border-0 shadow-sm app-page-header">
                    <div class="card-body p-4 p-lg-5 d-flex flex-column justify-content-center">
                        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
                            <div>
                                <h1 class="h2 fw-bold mb-2" th:text="${selectedCategory != null ? selectedCategory.name + ' Products' : 'Products'}">Products</h1>
                                <p class="text-secondary mb-0"
                                   th:text="${selectedCategory != null ? selectedCategory.name + ' kategorisine ait urunler.' : 'Kategori bilgisiyle birlikte tum urunler.'}">
                                    Kategori bilgisiyle birlikte tum urunler.
                                </p>
                            </div>
                            <div class="d-flex flex-column flex-sm-row gap-2">
                                <a th:if="${selectedCategory != null}" href="/products" class="btn btn-outline-secondary">Tum urunler</a>
                                <a th:if="${isAdmin}" href="/admin/products" class="btn btn-dark">Admin CRUD</a>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col-12 col-xl-10">
                <div class="row g-4" th:if="${!#lists.isEmpty(products)}">
                    <div class="col-12 col-md-6 col-xl-4" th:each="product : ${products}">
                        <div class="card h-100 border-0 shadow-sm app-section-card">
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <h2 class="h5 fw-bold mb-0" th:text="${product.name}">Product Name</h2>
                                    <span class="badge text-bg-dark" th:text="${product.category.name}">Category</span>
                                </div>
                                <p class="text-secondary mb-3" th:text="${product.description ?: 'Aciklama eklenmemis.'}">Description</p>
                                <div class="fs-4 fw-bold text-primary" th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')} + ' EUR'">99.90 EUR</div>
                                <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                                    <a class="btn btn-outline-primary" th:href="@{/products/{id}(id=${product.id})}">Product Details</a>
                                    <form th:action="@{/cart/add}" method="post" th:attr="data-cart-endpoint=@{/api/cart/add}" data-cart-add-form>
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <input type="hidden" name="productId" th:value="${product.id}">
                                        <input type="hidden" name="redirectTo" value="/products">
                                        <button type="submit" class="btn btn-primary">Add to Cart</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="alert alert-success shadow-sm border-0" th:if="${successMessage}" th:text="${successMessage}"></div>
                <div class="alert alert-info shadow-sm border-0" th:if="${#lists.isEmpty(products)}">
                    Henuz urun yok. Admin ekranindan yeni urun ekleyebilirsiniz.
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/cart.js"></script>
</body>
</html>
