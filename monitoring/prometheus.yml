global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    basic_auth:
      username: __PROMETHEUS_BASIC_AUTH_USER__
      password: __PROMETHEUS_BASIC_AUTH_PASSWORD__
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: spring-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - wsl-host:8080

  - job_name: kafka
    metrics_path: /metrics
    static_configs:
      - targets:
          - broker:7071
